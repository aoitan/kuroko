services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      UV_CACHE_DIR: /var/cache/uv
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /var/cache/uv/project-env
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
      - ./.data:/workspace/.data
      - uv-cache:/var/cache/uv
    command: ["sh"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      UV_CACHE_DIR: /var/cache/uv
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /var/cache/uv/project-env
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
      - ./.data:/workspace/.data
      - uv-cache:/var/cache/uv
    entrypoint: ["uv", "run", "--directory", "/workspace"]
    command: ["kuroko", "--help"]

  kanpe:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      UV_CACHE_DIR: /var/cache/uv
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /var/cache/uv/project-env
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace
      - ./.data:/workspace/.data
      - uv-cache:/var/cache/uv
    entrypoint: ["uv", "run", "--directory", "/workspace"]
    command:
      - kanpe
      - view
      - --input-file
      - /workspace/.data/report.md
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --no-open-browser
    ports:
      - "8765:8765"

volumes:
  uv-cache:
